[project]
name = "httplua"
version = "1.0.0-dev"
type = "application"

[build]
# gnu99 for the CGI glue (httplua/cgihttpc/cgihttpd); LUA_USE_C89 +
# LUA_USE_JUMPTABLE=0 must match lua370's build so the Lua ABI lines up.
cflags = [
    "-std=gnu99",
    "-DLUA_USE_C89",
    "-DLUA_USE_JUMPTABLE=0",
    "-DLUA_USE_CTYPE=1",
    '-DHTTPLUA_VERSION=\"$(PROJECT_VERSION)\"',
]

# Lua CGI handler. sources globs the CGI glue (httplua/cgihttpc/cgihttpd) plus
# the CGI-patched Lua overrides (lauxlib/liolib/loadlib) — these are linked
# directly, so they win over lua370's archived versions (autocall only pulls
# undefined symbols). startup=crt1 for the threading runtime (@@CRT1).
[[module]]
name = "HTTPLUA"
startup = "crt1"
sources = ["src/*.c"]

[dependencies]
"mvslovers/lua370" = ">=1.0.3-dev"
"mvslovers/httpd" = "=4.0.0-dev"
"mvslovers/ufsd" = "=1.0.0-dev"

[release]
version_files = ["VERSION"]
